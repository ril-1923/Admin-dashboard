<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body 
{
 background:#f4f6f9;
  }
.page-header
 {
  background:linear-gradient(135deg,#4e73df,#224abe);
   color:#fff; padding:20px; border-radius:12px;
    }
.order-card 
{ 
border:none;
 border-radius:14px; 
 box-shadow:0 10px 25px rgba(0,0,0,.08);
  }
.status 
{ padding:4px 12px;
 border-radius:20px;
  font-size:.85rem;
   }
.status.pending 
{
 background:#fff3cd;
 color:#856404;
  }
.status.completed 
{
 background:#d4edda;
 color:#155724;
  }
.status.cancelled 
{
 background:#f8d7da;
  color:#721c24;
   }
</style>
</head>
<body>
<div class="container my-4">
<div class="page-header mb-4">
<h3 class="mb-0">Orders</h3>
<small>Track and manage customer orders</small>
</div>


<div class="card order-card">
<div class="card-body">
<table class="table align-middle"><thead class="table-light">
<tr>
<th>#Order ID</th>
<th>Customer</th>
<th>Date</th>
<th>Amount</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody>
<tr>
<td>#1021</td>
<td>Ahmed Khan</td>
<td>12 Jan 2026</td>
<td>₹2,450</td>
<td><span class="status completed">Completed</span></td>
<td><button class="btn btn-sm btn-outline-primary">View</button></td>
</tr>
<tr>
<td>#1022</td>
<td>Sara Ali</td>
<td>13 Jan 2026</td>
<td>₹1,299</td>
<td><span class="status pending">Pending</span></td>
<td><button class="btn btn-sm btn-outline-primary">View</button></td>
</tr>
<tr>
<td>#1023</td><td>John Peter</td>
<td>14 Jan 2026</td>
<td>₹899</td>
<td><span class="status cancelled">Cancelled</span></td>
<td><button class="btn btn-sm btn-outline-primary">View</button></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>
</body>
</html>
