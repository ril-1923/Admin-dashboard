<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dashboard | Custom Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />


<!-- Bootstrap & Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />


<style>
:root 
{
--primary: #5f27cd;
--dark: #1e1e2f;--light: #f4f6fb;
}


body
 {
background: linear-gradient(135deg, #eef2ff, #fdfbfb);
font-family: "Segoe UI", sans-serif;
}


/* Navbar */
.topbar
 {
background: rgba(30, 30, 47, 0.9);
backdrop-filter: blur(10px);
}


/* Sidebar */
.sidebar 
{
width: 260px;
min-height: 100vh;
background: var(--dark);
position: fixed;
top: 0;
left: 0;
padding-top: 70px;
transition: 0.3s;
}


.sidebar a 
{
color: #c7c9ff;
padding: 14px 22px;
display: flex;
align-items: center;
gap: 12px;
text-decoration: none;
transition: 0.3s;
}


.sidebar a:hover,
.sidebar a.active 
{
background: var(--primary);
color: #fff;
border-radius: 8px;
margin: 0 10px;
}


/* Content */
.content
 {
margin-left: 260px;
padding: 90px 25px 25px;
}


/* Stat Cards */
.stat-card 
{
border: none;border-radius: 16px;
background: rgba(255, 255, 255, 0.95);
box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}


.stat-icon
 {
width: 48px;
height: 48px;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
font-size: 22px;
color: #fff;
}


.bg-purple 
{ background: #5f27cd; }
.bg-green { background:#10ac84; }
.bg-orange { background: #ff9f43; }
.bg-red { background: #ee5253; }


/* Table */
.table-card 
{
border-radius: 16px;
overflow: hidden;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}


@media (max-width: 768px) {.sidebar { left: -260px; }
.sidebar.show { left: 0; }
.content { margin-left: 0; }
}
</style>
</head>
<body>


<!-- Navbar -->
<nav class="navbar navbar-dark fixed-top topbar">
<div class="container-fluid">
<button class="btn btn-outline-light d-md-none" id="menuToggle">
<i class="bi bi-list"></i>
</button><span class="navbar-brand ms-2">Admin Dashboard</span>


<div class="d-flex align-items-center gap-3">
<i class="bi bi-bell text-white"></i>
<img src="https://via.placeholder.com/38" class="rounded-circle" />
</div>
</div>
</nav>


<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<a href="dashboard.html" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
<a href="users.html"><i class="bi bi-people"></i> Users</a>
<a href="products.html"><i class="bi bi-box"></i> Products</a>
<a href="orders.html"><i class="bi bi-cart"></i> Orders</a>
<a href="settings.html"><i class="bi bi-gear"></i> Settings</a>
<a href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div><!-- Content -->
<div class="content">
<h4 class="fw-bold mb-4">Dashboard Overview</h4>


<!-- Stats -->
<div class="row g-4">
<div class="col-md-3 col-sm-6">
<div class="card stat-card p-3">
<div class="d-flex justify-content-between align-items-center">
<div>
<small>Total Users</small>
<h3 class="fw-bold">120</h3>
</div>
<div class="stat-icon bg-purple"><i class="bi bi-people"></i></div>
</div>
</div></div>
<div class="col-md-3 col-sm-6">
<div class="card stat-card p-3">
<div class="d-flex justify-content-between align-items-center">
<div>
<small>Orders</small>
<h3 class="fw-bold">45</h3>
</div>
<div class="stat-icon bg-green"><i class="bi bi-cart"></i></div>
</div>
</div>
</div><div class="col-md-3 col-sm-6">
<div class="card stat-card p-3">
<div class="d-flex justify-content-between align-items-center">
<div>
<small>Revenue</small>
<h3 class="fw-bold">₹25,000</h3>
</div>
<div class="stat-icon bg-orange"><i class="bi bi-currency-rupee"></i></div>
</div>
</div>
</div>
<div class="col-md-3 col-sm-6">
<div class="card stat-card p-3">
<div class="d-flex justify-content-between align-items-center">
<div>
<small>Pending</small>
<h3 class="fw-bold">5</h3>
</div>
<div class="stat-icon bg-red"><i class="bi bi-exclamation-circle"></i></div>
</div>
</div>
</div>
</div>


<!-- Recent Activity -->
<div class="card table-card mt-5">
<div class="card-header fw-bold">Recent Orders</div>
<div class="card-body p-0">
<table class="table mb-0">
<thead class="table-light">
<tr><th>#</th>
<th>User</th>
<th>Product</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Rahul</td>
<td>Laptop</td>
<td><span class="badge bg-success">Completed</span></td>
</tr>
<tr>
<td>2</td>
<td>Pooja</td>
<td>Mobile</td>
<td><span class="badge bg-warning">Pending</span></td>
</tr>
<tr>
<td>3</td><td>Amit</td>
<td>Headphones</td>
<td><span class="badge bg-danger">Cancelled</span></td>
</tr>
</tbody>
</table>
</div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("menuToggle").addEventListener("click", () => {
document.getElementById("sidebar").classList.toggle("show");
});
</script>
</body>
</html>
