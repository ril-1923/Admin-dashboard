<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard | Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body
 { 
background:#f4f6f9;
 }
.settings-card { 
border:none;
 border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
   }
.section-title
 { 
 font-weight:600;
  margin-bottom:10px;
   }
</style>
</head>
<body>
<div class="container my-4">
<div class="mb-4">
<h3>Settings</h3>
<small class="text-muted">Manage your account preferences</small>
</div>


<div class="card settings-card mb-4">
<div class="card-body">
<div class="section-title">Profile Settings</div>
<div class="row g-3">
<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" value="Mohamed Rilwan">
</div>
<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email" class="form-control" value="rilwan.207@gmail.com">
</div>
</div>
</div>
</div>


<div class="card settings-card mb-4">
<div class="card-body">
<div class="section-title">Preferences</div>
<div class="form-check form-switch mb-2">
<input class="form-check-input" type="checkbox" checked>
<label class="form-check-label">Enable Notifications</label>
</div>
<div class="form-check form-switch">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Dark Mode</label>
</div>
</div>
</div>


<div class="card settings-card">
<div class="card-body">
<div class="section-title">Security</div>
<button class="btn btn-outline-danger">Change Password</button>
</div>
</div>
</div>
</body>
</html>
